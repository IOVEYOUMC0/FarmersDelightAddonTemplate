# Example addon configuration. Edit and run /fd reload all to apply.

# Item-id -> duration-ticks mappings for FarmersDelight's food effects.
# Comfort: bumps the player's nourishment briefly when eaten. Nourishment: longer/stronger variant.
# Loaded by ExampleFoodEffectRegistrar; cleared and re-applied on /fd reload.
food-effects:
  comfort:
    - id: "minecraft:golden_apple"
      duration: 600
  nourishment:
    - id: "minecraft:cooked_beef"
      duration: 300
