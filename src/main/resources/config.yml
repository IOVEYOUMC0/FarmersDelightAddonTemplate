# Example addon configuration. Edit and run /fd reload all to apply.

# Item-id -> duration (in seconds) mappings for FarmersDelight's food effects.
# Comfort: heals 1 HP on an interval while the player's saturation is 0 (slow regen while unsaturated).
# Nourishment: zeroes the player's exhaustion, suppressing hunger drain. (Comfort and Nourishment are
# distinct effects, not weaker/stronger versions of each other.)
# Loaded by ExampleFoodEffectRegistrar; cleared and re-applied on /fd reload.
food-effects:
  comfort:
    - id: "minecraft:golden_apple"
      duration: 600
  nourishment:
    - id: "minecraft:cooked_beef"
      duration: 300
